version: '3.8'

services:
  mongo:
    image: mongo:7.0
    container_name: codesync-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: codesync
    volumes:
      - mongo_data:/data/db
    networks:
      - codesync-network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    container_name: codesync-server
    ports:
      - "5000:5000"
    environment:
      MONGODB_URI: mongodb://mongo:27017/codesync
      NODE_ENV: development
      PORT: 5000
      JWT_SECRET: dev-secret-key-change-in-production
      GOOGLE_GENERATIVE_AI_KEY: ${GOOGLE_GENERATIVE_AI_KEY}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
    depends_on:
      - mongo
    volumes:
      - ./server/src:/app/src
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - codesync-network

  client:
    image: node:20-alpine
    container_name: codesync-client
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000
      REACT_APP_SOCKET_URL: http://localhost:5000
    volumes:
      - ./client:/app
      - /app/node_modules
    command: npm start
    depends_on:
      - server
    networks:
      - codesync-network

volumes:
  mongo_data:

networks:
  codesync-network:
    driver: bridge
